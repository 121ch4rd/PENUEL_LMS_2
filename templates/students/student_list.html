{% extends 'base.html' %}

{% block content %}

<form>

<input type="text"
name="q"
placeholder="Search Student">

<button>

Search

</button>

</form>

<hr>

<table class="table">

<tr>

<th>Reg No</th>
<th>Name</th>
<th>Program</th>

</tr>

{% for student in students %}

<tr>

<td>{{ student.reg_no }}</td>
<td>{{ student.name }}</td>
<td>{{ student.program }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
